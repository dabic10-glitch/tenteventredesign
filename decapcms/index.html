<!doctype html><html><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><meta content="noindex" name="robots"/><title>Content Manager</title><script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script></head><body><script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script><script>
(function() {
  var path = window.location.pathname.replace(/\/$/, '') || '/';
  var links = document.querySelectorAll('#header nav ul li a');
  links.forEach(function(link) {
    link.classList.remove('aw-link-active');
    var href = link.getAttribute('href').replace(/\/$/, '') || '/';
    if (href === path) {
      link.classList.add('aw-link-active');
    }
  });
})();
</script>
</body></html>
